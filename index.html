<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GTD Board</title>
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/header.css" />
    <link rel="stylesheet" href="css/sidebar.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/board.css" />
    <link rel="stylesheet" href="css/modal.css" />
    <link rel="stylesheet" href="css/dragdrop.css" />
    <link rel="stylesheet" href="css/responsive.css" />
    <link rel="stylesheet" href="css/animations.css" />
    <style>
        .login-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:10000}
        .login-box{background:#fff;border-radius:16px;padding:40px;text-align:center;max-width:360px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .login-box h2{margin:0 0 8px;font-size:24px}
        .login-box p{margin:0 0 24px;color:#666;font-size:14px}
        .login-btn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border:1px solid #ddd;border-radius:8px;background:#fff;cursor:pointer;font-size:14px}
        .login-btn:hover{background:#f5f5f5}
        .login-btn svg{width:18px;height:18px}
        .offline-badge{display:none;position:fixed;top:12px;right:12px;background:#e0e0e0;color:#666;padding:4px 12px;border-radius:12px;font-size:12px;z-index:9999}
        .sync-status{font-size:11px;color:#999;padding:4px 12px;display:none}
    </style>
</head>

<body>
    <!-- 로그인 오버레이 -->
    <div id="login-overlay" class="login-overlay" style="display:none;">
        <div class="login-box">
            <h2>GTD Board</h2>
            <p>Google 계정으로 로그인하면<br>모든 기기에서 데이터가 동기화됩니다</p>
            <button id="login-btn" class="login-btn">
                <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.27-4.74 3.27-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                Google로 로그인
            </button>
        </div>
    </div>
    <div id="offline-badge" class="offline-badge">오프라인 모드</div>
    <div id="sync-status" class="sync-status"></div>

    <!-- 전체 레이아웃 -->
    <div class="page">
        <!-- 사이드바 -->
        <aside class="sidebar" id="sidebar">
            <div class="mobile-header">
                <button class="sidebar-toggle-btn" id="sidebar-close">✕</button>
                <span class="mobile-header-title">GTD Board</span>
            </div>
            <div class="navmenu" id="sidebar-nav"></div>
        </aside>
        <div class="sidebar-backdrop" id="sidebar-overlay"></div>

        <!-- 메인 영역 -->
        <main>
            <div class="mobile-header" id="mobile-header">
                <button class="sidebar-toggle-btn" id="sidebar-toggle">☰</button>
                <span class="mobile-header-title">GTD Board</span>
            </div>
            <div class="content" id="content-area"></div>
        </main>
    </div>

    <!-- Undo 스낵바 -->
    <div class="undo-snackbar" id="undo-snackbar" style="display:none;">
        <span id="undo-message"></span>
        <button class="undo-btn" id="undo-btn">실행취소</button>
        <button class="close-btn" id="undo-close-btn">×</button>
    </div>

    <!-- 토스트 -->
    <div id="toast-container" class="toast-container"></div>

    <!-- JS -->
    <script src="js/enums.js"></script>
    <script src="js/models.js"></script>
    <script src="js/dataService.js"></script>
    <script src="js/undoService.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/taskNode.js"></script>
    <script src="js/taskModal.js"></script>
    <script src="js/dragDrop.js"></script>
    <script src="js/boardView.js"></script>
    <script src="js/listView.js"></script>
    <script src="js/bulkEdit.js"></script>
    <script src="js/app.js"></script>

    <!-- Firebase -->
    <script>
        (function(){
            var scripts=['https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js','https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js','https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js'];
            var failed=false;
            function onAllLoaded(){
                if(failed)return;
                try{
                    firebase.initializeApp({apiKey:"AIzaSyBndsmYDLP7zHk-8VCCLB7zpAr-zE4wu_o",authDomain:"my-gtd-18890.firebaseapp.com",projectId:"my-gtd-18890",storageBucket:"my-gtd-18890.firebasestorage.app",messagingSenderId:"922209539844",appId:"1:922209539844:web:fd3efef89b14396d15a251"});
                    window._firebase={auth:firebase.auth(),db:firebase.firestore(),provider:new firebase.auth.GoogleAuthProvider()};
                    document.dispatchEvent(new Event('firebase-ready'));
                }catch(e){document.dispatchEvent(new Event('firebase-failed'));}
            }
            function loadNext(i){
                if(i>=scripts.length){onAllLoaded();return;}
                var s=document.createElement('script');s.src=scripts[i];
                s.onload=function(){loadNext(i+1);};
                s.onerror=function(){failed=true;document.dispatchEvent(new Event('firebase-failed'));};
                document.head.appendChild(s);
            }
            loadNext(0);
            setTimeout(function(){if(!window._firebase&&!failed){failed=true;document.dispatchEvent(new Event('firebase-failed'));}},3000);
        })();
    </script>
</body>
</html>
